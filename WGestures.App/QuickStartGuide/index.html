<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WGestures QuickStart</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: whitesmoke;
        }

        #app {
            text-align: center;
        }

        #slides {
            position: relative;
            width: 936px;
            height: 525px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* 图片 */
        #slides img {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        #slides img.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 左右按钮 */
        .slidesjs-navigation {
            top: 35%;
            position: absolute;
            width: 80px;
            height: 100px;
            z-index: 1024;
        }

        .slidesjs-previous {
            left: 0;
            background: url("img/prev.png");
        }

        .slidesjs-next {
            right: 0;
            background: url("img/next.png");
        }

        /* 分页 */
        .slidesjs-pagination {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .slidesjs-pagination li {
            margin: 0 8px;
        }

        .slidesjs-pagination a {
            display: block;
            width: 15px;
            height: 13px;
            background: url("img/pagination_.png") 0 0;
        }

        .slidesjs-pagination a.active {
            background-position: 0 -13px;
        }
    </style>
</head>

<body
        ondragstart="return false;"
        onselectionstart="return false;"
>

<div id="app">
    <div
            id="slides"
            @mouseenter="pause"
            @mouseleave="resume"
            @wheel.prevent="onWheel"
            @touchstart="touchStart"
            @touchend="touchEnd"
    >
        <img
                v-for="(img, index) in images"
                :key="index"
                :src="img"
                :class="{ active: currentIndex === index }"
        >

        <a
                class="slidesjs-navigation slidesjs-previous"
                @click="prev"
                v-show="currentIndex > 0"
        ></a>

        <a
                class="slidesjs-navigation slidesjs-next"
                @click="next"
                v-show="currentIndex < images.length - 1"
        ></a>

        <ul class="slidesjs-pagination">
            <li v-for="(img, index) in images" :key="index">
                <a
                        href="#"
                        :class="{ active: currentIndex === index }"
                        @click.prevent="goTo(index)"
                ></a>
            </li>
        </ul>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script>
    const { createApp, ref, onMounted, onUnmounted } = Vue

    createApp({
        setup() {
            const images = [
                "slides/0.png",
                "slides/1.png",
                "slides/2.png",
                "slides/3.png",
                "slides/4.png",
                "slides/5.png"
            ]

            const currentIndex = ref(0)
            let timer = null
            const interval = 3000

            const startAutoPlay = () => {
                timer = setInterval(() => {
                    if (currentIndex.value < images.length - 1) {
                        currentIndex.value++
                    } else {
                        currentIndex.value = 0
                    }
                }, interval)
            }

            const pause = () => clearInterval(timer)
            const resume = () => startAutoPlay()

            const prev = () => {
                if (currentIndex.value > 0) currentIndex.value--
            }

            const next = () => {
                if (currentIndex.value < images.length - 1) currentIndex.value++
            }

            const goTo = (index) => {
                currentIndex.value = index
            }

            /* 滚轮 */
            const onWheel = (e) => {
                e.deltaY > 0 ? next() : prev()
            }

            /* 触摸 */
            let touchStartX = 0
            const touchStart = (e) => {
                touchStartX = e.changedTouches[0].screenX
            }
            const touchEnd = (e) => {
                const diff = e.changedTouches[0].screenX - touchStartX
                if (Math.abs(diff) > 50) {
                    diff > 0 ? prev() : next()
                }
            }

            /* 键盘 */
            const onKeyDown = (e) => {
                if (e.key === "ArrowLeft") prev()
                if (e.key === "ArrowRight") next()
            }

            onMounted(() => {
                startAutoPlay()
                window.addEventListener("keydown", onKeyDown)
            })

            onUnmounted(() => {
                clearInterval(timer)
                window.removeEventListener("keydown", onKeyDown)
            })

            return {
                images,
                currentIndex,
                prev,
                next,
                goTo,
                pause,
                resume,
                onWheel,
                touchStart,
                touchEnd
            }
        }
    }).mount("#app")
</script>

</body>
</html>
